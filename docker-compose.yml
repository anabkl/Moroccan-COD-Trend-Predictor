version: '3.8'

services:
  backend:
    build: ./backend
    container_name: soukai-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - soukai-db:/app/db
    environment:
      - DATABASE_URL=sqlite:///./db/soukai.db
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: soukai-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  soukai-db:
